<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#dfe4ef">
  <meta name="description" content="브라우저에서 즐기는 주사위 디펜스 솔로 모드 프로토타입">
  <title>Dice Frontline</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell">
    <section id="menuScreen" class="screen menu-screen active" aria-label="메인 메뉴">
      <div class="menu-backdrop">
        <div class="menu-panel">
          <button id="soloModeButton" class="menu-button solo-button" type="button">솔로모드</button>
          <button id="onlineModeButton" class="menu-button online-button" type="button">온라인 대전</button>
        </div>
      </div>
    </section>

    <section id="gameScreen" class="screen game-screen" aria-label="솔로 모드 게임 화면">
      <div class="game-shell">
        <div class="left-column">
          <div class="top-stats">
            <div class="stat-box"><span>웨이브</span><strong id="waveValue">1</strong></div>
            <div class="stat-box"><span>남은 시간</span><strong id="timerValue">01:06</strong></div>
            <div class="stat-box heart-box"><span>하트</span><strong id="heartValue">3</strong></div>
            <div class="stat-box"><span>SP</span><strong id="spValue">100</strong></div>
            <div class="stat-box wide-box"><span>처치 / 점수</span><strong><span id="killValue">0</span> / <span id="scoreValue">0</span></strong></div>
          </div>

          <div class="battlefield-card">
            <div class="field-header">
              <div>
                <span class="field-kicker">SOLO MODE</span>
                <strong id="playerNameLabel">플레이어</strong>
              </div>
              <div class="field-side-info">
                <span id="fieldWaveLabel">웨이브 1</span>
                <span id="enemyCountLabel">0 enemies</span>
              </div>
            </div>

            <div class="lane-shell">
              <canvas id="laneCanvas" width="920" height="260" aria-label="적 이동 경로"></canvas>
              <div id="floatingTextLayer" class="floating-text-layer" aria-hidden="true"></div>
            </div>

            <div class="board-shell">
              <div class="board-title-row">
                <span>DICE GRID</span>
                <span id="mergeHint">같은 주사위를 드래그해서 합성하세요</span>
              </div>
              <div id="diceBoard" class="dice-board" aria-label="주사위 보드"></div>
            </div>
          </div>
        </div>

        <aside class="right-panel">
          <div class="panel-card summon-panel">
            <div class="panel-kicker">SUMMON</div>
            <h2>무작위 주사위</h2>
            <button id="summonButton" class="summon-button" type="button">
              <span>소환</span>
              <strong id="summonCostValue">10 SP</strong>
            </button>
          </div>

          <div class="panel-card upgrade-panel">
            <div class="panel-head-row">
              <div>
                <div class="panel-kicker">POWER UP</div>
                <h2>주사위 강화</h2>
              </div>
              <span class="panel-note">최대 Lv.5</span>
            </div>
            <div id="upgradeList" class="upgrade-list"></div>
          </div>

          <div class="panel-card utility-panel">
            <button id="pauseButton" class="utility-button" type="button">일시정지</button>
            <button id="exitButton" class="utility-button exit-button" type="button">나가기</button>
          </div>
        </aside>

        <div id="pauseOverlay" class="overlay hidden">
          <div class="overlay-card">
            <button id="resumeButton" class="overlay-button" type="button">계속하기</button>
            <button id="pauseExitButton" class="overlay-button secondary" type="button">메인으로</button>
          </div>
        </div>

        <div id="resultOverlay" class="overlay hidden">
          <div class="overlay-card result-card">
            <div class="result-title">게임 종료</div>
            <div id="resultSummary" class="result-summary">웨이브 1에서 방어에 실패했습니다.</div>
            <div class="result-grid">
              <div><span>웨이브</span><strong id="resultWave">1</strong></div>
              <div><span>처치</span><strong id="resultKills">0</strong></div>
              <div><span>점수</span><strong id="resultScore">0</strong></div>
            </div>
            <div class="result-actions">
              <button id="retryButton" class="overlay-button" type="button">다시 시작</button>
              <button id="resultMenuButton" class="overlay-button secondary" type="button">메인으로</button>
            </div>
          </div>
        </div>

        <div id="toast" class="toast" role="status" aria-live="polite"></div>
        <div id="dragGhost" class="drag-ghost hidden" aria-hidden="true"></div>
      </div>
    </section>
  </div>
  <script src="./game.js"></script>
</body>
</html>
